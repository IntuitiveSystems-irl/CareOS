# ── CareOS local / Cloudflare Tunnel nginx config ──────────────────────────────
# HTTP-only. TLS is terminated by Cloudflare before traffic reaches this server.
# Real client IPs arrive via the CF-Connecting-IP header set by cloudflared;
# set_real_ip_from rewrites $remote_addr so per-client rate limiting works.
# ────────────────────────────────────────────────────────────────────────────────

# Rate-limit zone for researcher-only API (R-7)
limit_req_zone $binary_remote_addr zone=research_auth:10m rate=5r/s;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # Restore real client IP from Cloudflare Tunnel so rate-limiting and audit
    # logs reflect the actual requester, not cloudflared's loopback address.
    real_ip_header CF-Connecting-IP;
    set_real_ip_from 0.0.0.0/0;

    # ── Security headers (no HSTS — Cloudflare handles TLS termination) ──
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' wss: https:; media-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    # ── Prevent browsers from caching index.html (avoids stale bundle after deploy) ──
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files /index.html =404;
    }

    # ── Block sensitive dotfiles ──
    location ~ /\. {
        deny all;
        return 404;
    }

    # Researcher credential check + results — rate-limited (R-7).
    # Participant telemetry submission routes are intentionally NOT throttled.
    location /api/research/auth/ {
        limit_req zone=research_auth burst=10 nodelay;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    location /api/research/results/ {
        limit_req zone=research_auth burst=20 nodelay;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # FHIR endpoints
    location /fhir/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # CDS Hooks service (HL7 CDS Hooks discovery + invoke)
    location /cds-services {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # SMART on FHIR auth endpoints
    location /auth/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # SMART discovery + JWKS (Epic Backend Services).
    # ^~ commits nginx to this prefix and skips the ~/\. regex above.
    location ^~ /.well-known/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    # WebSocket for real-time notifications
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # AI Layer
    location /ai/ {
        proxy_pass http://ai-layer:8100/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Favicon & static assets — must never fall through to SPA
    location ~* ^/(favicon\.ico|favicon-32\.png|apple-touch-icon\.png|robots\.txt|sitemap\.xml)$ {
        root /usr/share/nginx/html;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
