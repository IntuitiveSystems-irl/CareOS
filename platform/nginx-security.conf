# ── Rate-limit zone for researcher-only API (R-7): slows credential brute force.
# Applied only to /api/research/auth/ and /api/research/results/ so participant
# telemetry submissions are never throttled.
limit_req_zone $binary_remote_addr zone=research_auth:10m rate=5r/s;

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name launchflow.tech www.launchflow.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    server_name launchflow.tech www.launchflow.tech;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/launchflow.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/launchflow.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security Headers ──
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' wss: https:; media-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    # ── Hide server version ──
    server_tokens off;

    # ── Block sensitive dotfiles (e.g. /.env, /.git/...) ──
    # NOTE: must come AFTER any "^~ /.well-known/..." locations below; the
    # ^~ modifier makes nginx skip regex matching when it matches, which is
    # what lets jwks.json and smart-configuration through.
    location ~ /\. {
        deny all;
        return 404;
    }

    # Researcher credential check + analytics/export — rate-limited (R-7).
    # These prefixes are researcher-only; participant routes live elsewhere
    # under /api/research/participants/ and are intentionally NOT throttled.
    location /api/research/auth/ {
        limit_req zone=research_auth burst=10 nodelay;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/research/results/ {
        limit_req zone=research_auth burst=20 nodelay;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FHIR endpoints
    location /fhir/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # CDS Hooks service (HL7 CDS Hooks discovery + invoke). Top-level
    # /cds-services path per spec — must reach the backend so external EHRs
    # (e.g. Epic) and the CareOS UI can discover and call decision support.
    location /cds-services {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SMART on FHIR auth endpoints
    location /auth/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SMART discovery + JWKS (Epic Backend Services).
    # `^~` makes nginx commit to this prefix and skip the `~ /\.` regex above,
    # which would otherwise 404 every /.well-known/* path.
    location ^~ /.well-known/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # certbot ACME challenge — same precedence reason; keep this above the
    # dotfile blocker so renewals work.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # WebSocket for real-time notifications
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # AI Layer
    location /ai/ {
        proxy_pass http://ai-layer:8100/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── wa.launchflow.tech → host pm2 (Next.js on host:3001) ──
server {
    listen 80;
    server_name wa.launchflow.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name wa.launchflow.tech;

    ssl_certificate     /etc/letsencrypt/live/wa.launchflow.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wa.launchflow.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    server_tokens off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 25m;

    location / {
        proxy_pass         http://172.18.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $http_upgrade;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# ── buildops.launchflow.tech : bad-bot denylist + API rate-limit zone (http context) ──
map $http_user_agent $buildops_bad_bot {
    default 0;
    "~*(GPTBot|ChatGPT-User|OAI-SearchBot|CCBot|ClaudeBot|Claude-Web|anthropic-ai|Google-Extended|PerplexityBot|Bytespider|Amazonbot|Applebot-Extended|meta-externalagent|FacebookBot|Diffbot|ImagesiftBot|DataForSeoBot)" 1;
    "~*(AhrefsBot|SemrushBot|MJ12bot|DotBot|BLEXBot|PetalBot|MauiBot|SeznamBot|magpie-crawler|serpstatbot|ZoominfoBot)" 1;
    "~*(python-requests|Scrapy|HTTrack|libwww-perl|Go-http-client|nikto|sqlmap|masscan|nmap|zgrab|WinHttp|wpscan)" 1;
    "" 1;
}
limit_req_zone $binary_remote_addr zone=buildops_api:10m rate=10r/s;

# ── buildops.launchflow.tech ──
server {
    listen 80;
    server_name buildops.launchflow.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name buildops.launchflow.tech;

    root /usr/share/nginx/buildops;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/buildops.launchflow.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/buildops.launchflow.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    server_tokens off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # Block the app source that is mounted under the web root (.env, index.js, node_modules, …)
    location ^~ /server/ {
        deny all;
        return 404;
    }
    # Block dotfiles such as /.env and /.git/*
    location ~ /\. {
        deny all;
        return 404;
    }

    # API + tracker + admin → buildops-checkout container (rate-limited)
    location /api/ {
        limit_req zone=buildops_api burst=20 nodelay;
        proxy_pass http://buildops-checkout:3099/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static site — deny scrapers/bad bots, then serve real files only
    location / {
        if ($buildops_bad_bot) { return 403; }
        try_files $uri $uri/ =404;
    }
}
